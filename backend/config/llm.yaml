llm:
  default: ${LLM_PROVIDER:-kimi}
  timeout: ${LLM_TIMEOUT:-120}
  max_retries: ${LLM_MAX_RETRIES:-2}
  thinking:
    enabled: ${LLM_THINKING_ENABLED:-true}
    effort: ${LLM_THINKING_EFFORT:-medium}
    budget_tokens: ${LLM_THINKING_BUDGET_TOKENS:-1024}
    keep: ${LLM_THINKING_KEEP:-all}
    display: ${LLM_THINKING_DISPLAY:-omitted}
  providers:
    kimi:
      type: kimi
      api_key: ${KIMI_API_KEY}
      model: ${KIMI_MODEL:-kimi-k2.6}
      base_url: https://api.moonshot.cn/v1
    kimi_coding:
      type: kimi_coding
      api_key: ${KIMI_API_KEY}
      model: ${KIMI_CODING_MODEL:-kimi-k2.6}
      base_url: https://api.kimi.com/coding/
    openai:
      type: openai
      api_key: ${OPENAI_API_KEY}
      model: ${OPENAI_MODEL}
      base_url: https://api.openai.com/v1
    claude:
      type: claude
      api_key: ${ANTHROPIC_API_KEY}
      model: ${ANTHROPIC_MODEL}
      base_url: https://api.anthropic.com
